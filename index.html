<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
crossorigin="anonymous">

</head>

<body>

<div class="gallery-header">
    <h1 class="main-title">Our Dev-Warriors</h1>
    <p class="sub-title">Showcasing creativity, innovation and code</p>
</div>

<!-- TOP SECTION : BOOTSTRAP CAROUSEL -->
<div class="top-scroll-section container-fluid mt-4">

<div id="topCarousel"
class="carousel slide"
data-ride="carousel"
data-interval="3000">

<!-- Indicators -->
<ol class="carousel-indicators">
<li data-target="#topCarousel" data-slide-to="0" class="active"></li>
<li data-target="#topCarousel" data-slide-to="1"></li>
<li data-target="#topCarousel" data-slide-to="2"></li>
</ol>

<!-- Slides -->
<div class="carousel-inner">

<div class="carousel-item active">
<img class="d-block w-100"
src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1200"
alt="Tropical Beach">
</div>

<div class="carousel-item">
<img class="d-block w-100"
src="https://images.unsplash.com/photo-1530789253388-582c481c54b0?w=1200"
alt="Hot Air Balloon">
</div>

<div class="carousel-item">
<img class="d-block w-100"
src="https://images.unsplash.com/photo-1516483638261-f4dbaf036963?w=1200"
alt="Italian Coast">
</div>

</div>

<!-- Controls -->
<a class="carousel-control-prev"
href="#topCarousel"
role="button"
data-slide="prev">

<span class="carousel-control-prev-icon" aria-hidden="true"></span>
<span class="sr-only">Previous</span>

</a>

<a class="carousel-control-next"
href="#topCarousel"
role="button"
data-slide="next">

<span class="carousel-control-next-icon" aria-hidden="true"></span>
<span class="sr-only">Next</span>

</a>

</div>

</div>

<!-- MAIN GALLERY CONTROLS -->
<div class="gallery-controls">

<div class="filter-dropdown">
<button class="filter-btn" onclick="toggleFilter()">All Categories</button>

<div class="filter-options" id="filterOptions">

<div class="filter-option active" data-filter="all">All</div>
<div class="filter-option" data-filter="nature">Nature</div>
<div class="filter-option" data-filter="city">City</div>
<div class="filter-option" data-filter="animals">Animals</div>
<div class="filter-option" data-filter="technology">Technology</div>

</div>
</div>

<div class="search-box">
<input
type="text"
id="searchInput"
placeholder="Search images..."
onkeyup="searchImages()">
</div>

</div>

<div class="loading" id="loading">Loading images...</div>

<div class="no-results" id="noResults">No images found</div>

<!-- MAIN GRID -->
<div id="mainGrid" class="main-grid-container"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">

<span class="lightbox-close" onclick="closeLightbox()">&times;</span>

<div class="lightbox-nav prev" onclick="changeImage(-1)">‹</div>

<div class="lightbox-nav next" onclick="changeImage(1)">›</div>

<div class="lightbox-content">

<img id="lightboxImg" src="" alt="">

<div class="lightbox-info" id="lightboxInfo"></div>

</div>

</div>

<script src="main.js"></script>

<script
src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
crossorigin="anonymous"></script>

<script
src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
crossorigin="anonymous"></script>

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
crossorigin="anonymous"></script>

</body>
</html>
